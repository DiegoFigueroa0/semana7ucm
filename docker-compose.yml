services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: appdb
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: apppass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4:latest
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres

  django:
    build: ./servicio1
    ports:
      - "8000:8000"
    depends_on:
      - postgres

  fastapi:
    build: ./servicio2
    ports:
      - "8080:8000"
    depends_on:
      - postgres

  angular:
    build: ./servicio3
    ports:
      - "4200:80"

volumes:
  postgres_data:
  pgadmin_data:
