name: build and push para AWS ECR - ECS

on:
  push:
    branches:
      - main


jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: descarga codigo
        uses: actions/checkout@v4.0.0

      - name: configurar aws
        uses: aws-actions/configure-aws-credentials@v4.0.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: login to ECR
        uses: aws-actions/amazon-ecr-login@v2.0.0


      - name: build and push servicio1
        run: |
          docker build -t servicio1 ./servicio1
          docker tag servicio1:latest 788356290964.dkr.ecr.us-east-1.amazonaws.com/servicio1
          docker push 788356290964.dkr.ecr.us-east-1.amazonaws.com/servicio1:latest

      - name: build and push servicio2
        run: |
            docker build -t servicio2 ./servicio2
            docker tag servicio2:latest 788356290964.dkr.ecr.us-east-1.amazonaws.com/servicio2
            docker push 788356290964.dkr.ecr.us-east-1.amazonaws.com/servicio2:latest

      - name: build and push servicio3
        run: |
            docker build -t servicio3 ./servicio3
            docker tag servicio3:latest 788356290964.dkr.ecr.us-east-1.amazonaws.com/servicio3
            docker push 788356290964.dkr.ecr.us-east-1.amazonaws.com/servicio3:latest

      - name: actualiza servicio1
        run: |
          aws ecs update-service \
            --cluster mi-cluster-ecs \
            --service servicio1-task-service-wkg4nh73 \
            --force-new-deployment

      - name: actualiza servicio2
        run: |
          aws ecs update-service \
            --cluster mi-cluster-ecs \
            --service servicio2-task-service-c3tt28hr \
            --force-new-deployment

      - name: actualiza servicio3
        run: |
          aws ecs update-service \
            --cluster mi-cluster-ecs \
            --service servicio3-task-service-4i608pj7 \
            --force-new-deployment
